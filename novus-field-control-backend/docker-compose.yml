services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: novus-field-control-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: novus_field_control
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "3441:5432"
    volumes:
      - control_postgres_data:/var/lib/postgresql/data

volumes:
  control_postgres_data:
